<!DOCTYPE html>
<html lang="en">
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="styles.css" rel="stylesheet">
    <style>
        body {
            background-image: url("duck-background.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="container">
        <header>
            <div class="col-12">
                <div class="row">
                    <h1 class="text-center text-white">Log in/Sign in</h1>
                </div>
            </div>
        </header>
    </div>
    <div class="container">
        <form id="myForm">
            <div class="row justify-content-center">

                <div class="col-md-4 text-center">
                    <div class="mb-3">
                        <label for="userName" class="form-label text-white">Username</label>
                        <input type="text" id="userName" class="form-control" placeholder="Enter username">
                    </div>

                    <div class="mb-3">
                        <label for="Password" class="form-label text-white">Password</label>
                        <input type="password" id="Password" class="form-control" placeholder="Enter Password">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" id="loginBtn" class="btn btn-primary">Log In</button>
                        <button type="submit" id="signInBtn" class="btn btn-secondary">Sign In (Register)</button>
                    </div>
                </div>

            </div>
        </form>
        <div class="row">
            <div class="col-12 text-center">
                <p id="greeting"></p>

            </div>
        </div>
    </div>


    <script src="index.js"></script>


</body>

</html>

</html>
